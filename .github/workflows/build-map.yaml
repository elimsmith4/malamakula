name: Build property map

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" # daily at 12:00 UTC = 2:00 AM Hawaii

permissions:
  contents: write

jobs:
  build-map:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build map
        run: |
          python malama_kula_mapping.py \
            --csv-url "${{ secrets.PROPERTIES_CSV_URL }}" \
            --parcels Maui_Parcels.geojson \
            --output-dir public

      - name: Commit updated map
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/
          git commit -m "Update property map" || echo "No changes to commit"
          git push